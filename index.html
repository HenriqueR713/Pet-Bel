<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero com background SVG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero">
    <img src="assets/imagens/imagem-bg/hero_bg_NW.svg" class="hero-bg" alt="">

    <div class="hero-content">
      <img src="assets/imagens/imagem-logo/IMG_4067.PNG" class="logo-selo" alt="Selo Pet Bel - desde 2020">

      <span class="brand-text brand-pet">
        <span class="camada-tras" aria-hidden="true">PET</span>
        <span class="camada-frente">PET</span>
      </span>

      <span class="brand-text brand-bel">
        <span class="camada-tras" aria-hidden="true">BEL</span>
        <span class="camada-frente">BEL</span>
      </span>

     
    </div>
  </section>

</body>
</html>
