<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Bel</title>
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="assets/imagens/Favicon/android-chrome-192x192.png"image/x-icon">
</head>


<body>

  <section class="hero">
    <img src="assets/imagens/imagem-bg/hero_bg_adjust_01.svg" class="hero-bg" alt="">

    <div class="hero-content">
      <img src="assets/imagens/imagem-logo/pet_bel_com_anel_02.png" class="logo-selo" alt="Selo Pet Bel - desde 2020">

      <span class="brand-text brand-pet">
        <span class="camada-tras" aria-hidden="true">PET</span>
        <span class="camada-frente">PET</span>
      </span>

      <span class="brand-text brand-bel">
        <span class="camada-tras" aria-hidden="true">BEL</span>
        <span class="camada-frente">BEL</span>
      </span>

    </div>
  </section>

  <section class="banho-tosa">

    <div class="banho-tosa__circulos" aria-hidden="true">
      <span class="banho-tosa__circulo banho-tosa__circulo--1"></span>
      <span class="banho-tosa__circulo banho-tosa__circulo--2"></span>
      <span class="banho-tosa__circulo banho-tosa__circulo--3"></span>
      <span class="banho-tosa__circulo banho-tosa__circulo--4"></span>
    </div>

    

    <div class="banho-tosa__wrap">

      <div class="banho-tosa__texto">
        <h2 class="banho-tosa__titulo">BANHO E TOSA</h2>
        <p class="banho-tosa__frase">
         <span class="banho-tosa__frase-destaque"> Seu pet sai de banho novo <br> e do nosso jeitinho</span>
        </p>

        <ul class="banho-tosa__lista">
          <li class="banho-tosa__item">Limpeza de ouvidos</li>
          <li class="banho-tosa__item">Hidratação de pele e pelagem</li>
          <li class="banho-tosa__item">Corte de unhas</li>
          <li class="banho-tosa__item">Tosas especiais</li>
          <li class="banho-tosa__item">Tosas completas</li>
          <li class="banho-tosa__item">Tosas higiênicas</li>
        </ul>
      </div>

      <div class="banho-tosa__imagem">
        <div class="banho-tosa__foto">
          <!-- Assim que você reenviar a imagem, troque este placeholder por: -->
          <!-- <img src="assets/imagens/banho-tosa/SEU_ARQUIVO_AQUI" alt="Cachorro tomando banho"> -->
          <span class="banho-tosa__foto-legenda">espaço reservado para<br>ilustração / foto do banho</span>
        </div>
      </div>

    </div>
  </section>

<script src="script.js"></script>
</body>
</html>
